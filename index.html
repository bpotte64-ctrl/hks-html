<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Hollow Knight SilkSong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #0f0; font-family: monospace; }
    #status { padding: 10px; }
    #log { height: calc(100vh - 42px); overflow-y: auto; padding: 10px; white-space: pre-wrap; border-top: 1px solid #0f0; }
    #unity-container { position: fixed; inset: 0; display: none; }
    #unity-canvas { width: 100%; height: 100%; display: block; background: #000; }
  </style>
</head>
<body>
  <div id="status">Starting...</div>
  <div id="log"></div>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>

  <script src="Build/w-pt.loader.js"></script>
  <script>
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    const unityContainer = document.getElementById('unity-container');
    const canvas = document.getElementById('unity-canvas');

    function line(msg) {
      const d = document.createElement('div');
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
    }

    window.addEventListener('error', e => line(`ERROR: ${e.message}`));
    window.addEventListener('unhandledrejection', e => line(`REJECTION: ${e.reason}`));

    function showBanner(msg, type) {
      line(`BANNER ${type}: ${msg}`);
    }

    const config = {
      dataUrl: 'Build/w-pt.data.unityweb',
      frameworkUrl: 'Build/w-pt.framework.js.unityweb',
      codeUrl: 'Build/w-pt.wasm.unityweb',
      streamingAssetsUrl: 'StreamingAssets',
      companyName: 'EDUrocks Group, Truffled, GN-Math',
      productName: 'Hollow Knight SilkSong',
      productVersion: '1.0',
      showBanner: showBanner,
      webglContextAttributes: { preserveDrawingBuffer: false, powerPreference: 1 },
      cacheControl: function(url) {
        if (url.match(/\.data/) || url.match(/\.bundle/) || url.match(/\.wasm/) || url.match(/\.unityweb/)) return 'must-revalidate';
        return 'no-store';
      }
    };

    line('Calling createUnityInstance...');
    unityContainer.style.display = 'block';

    createUnityInstance(canvas, config, p => {
      status.textContent = 'Loading... ' + Math.round(p * 100) + '%';
    }).then(() => {
      status.textContent = 'Loaded.';
      line('Unity loaded successfully.');
    }).catch(err => {
      status.textContent = 'Failed.';
      line(`FAILED: ${err.message || err}`);
    });
  </script>
</body>
</html>
