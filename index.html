<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Debug</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 16px;
      padding: 10px;
    }
    #log {
      white-space: pre-wrap;
      height: 95vh;
      overflow-y: auto;
      border: 1px solid #0f0;
      padding: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="log">PAGE STARTED</div>

  <script>
    const log = document.getElementById('log');
    function write(msg) {
      const div = document.createElement('div');
      div.textContent = msg;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    write('1. DOM loaded');
    write('2. WebGL: ' + !!(document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('webgl2')));
    write('3. WebAssembly: ' + !!window.WebAssembly);

    setTimeout(() => write('4. Timer works'), 1000);
  </script>
</body>
</html>
