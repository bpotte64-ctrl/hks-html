<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Debug</title>
  <style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
    #top { padding: 12px; }
    #log {
      height: calc(100vh - 52px);
      overflow-y: auto;
      background: rgba(0,0,0,0.95);
      padding: 10px;
      box-sizing: border-box;
      white-space: pre-wrap;
    }
    .warn { color: #ff0; }
    .error { color: #f66; }
    .progress { color: #66f; }
  </style>
</head>
<body>
  <div id="top">DEBUG CONSOLE</div>
  <div id="log"></div>

  <script>
    const logEl = document.getElementById('log');
    let logging = false;

    function addLine(msg, cls='') {
      if (logging) return;
      logging = true;
      const div = document.createElement('div');
      if (cls) div.className = cls;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      logging = false;
    }

    const nativeConsole = {
      log: console.log.bind(console),
      warn: console.warn.bind(console),
      error: console.error.bind(console),
      info: console.info.bind(console)
    };

    console.log = (...args) => { addLine(args.map(x => String(x)).join(' ')); nativeConsole.log(...args); };
    console.warn = (...args) => { addLine(args.map(x => String(x)).join(' '), 'warn'); nativeConsole.warn(...args); };
    console.error = (...args) => { addLine(args.map(x => String(x)).join(' '), 'error'); nativeConsole.error(...args); };
    console.info = (...args) => { addLine(args.map(x => String(x)).join(' ')); nativeConsole.info(...args); };

    window.addEventListener('error', e => {
      addLine(`SCRIPT ERROR: ${e.message}`, 'error');
    });

    window.addEventListener('unhandledrejection', e => {
      addLine(`PROMISE ERROR: ${e.reason}`, 'error');
    });

    addLine('Page loaded');
    addLine('Checking support...');

    const testCanvas = document.createElement('canvas');
    const gl = testCanvas.getContext('webgl') || testCanvas.getContext('webgl2');
    addLine(`WebGL: ${!!gl}`);
    addLine(`WebAssembly: ${!!window.WebAssembly}`);
  </script>
</body>
</html>
