<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Knight Silksong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #unity-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #unity-canvas { width: 100%; height: 100%; background: #000; }
    #unity-warning, #loading-text {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: white; font-family: sans-serif; z-index: 10;
    }
    #loading-text { top: 20px; font-size: 24px; }
    #unity-warning { bottom: 20px; width: min(90vw, 800px); }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <div id="unity-warning"></div>

  <script src="jszip.min.js"></script>
  <script src="w-pt.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingText = document.querySelector("#loading-text");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      const div = document.createElement("div");
      div.textContent = msg;
      div.style.padding = "10px";
      div.style.margin = "6px 0";
      div.style.background = type === "error" ? "rgba(180,0,0,0.85)" : "rgba(180,180,0,0.85)";
      warningBanner.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }

    const config = {
      dataUrl: "w-pt.data.unityweb",
      frameworkUrl: "w-pt.framework.js.unityweb",
      codeUrl: "w-pt.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "EDUrocks Group, Truffled, GN-Math",
      productName: "Hollow Knight SilkSong",
      productVersion: "1.0",
      showBanner: unityShowBanner
    };

    if (!window.WebAssembly || !window.WebGLRenderingContext) {
      loadingText.textContent = "This Chromebook does not support WebGL/WebAssembly for this build.";
    } else {
      createUnityInstance(canvas, config, progress => {
        loadingText.textContent = `LOADING... ${Math.round(progress * 100)}%`;
      }).then(() => {
        loadingText.remove();
      }).catch(err => {
        loadingText.textContent = "ERROR: " + err.message;
        console.error(err);
      });
    }
  </script>
</body>
</html>
