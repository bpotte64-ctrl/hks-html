<!DOCTYPE html>
<html>
<head>
  <title>Debug</title>
  <style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; font-size: 14px; padding: 20px; }
    #log { height: 80vh; overflow-y: scroll; background: rgba(0,0,0,0.9); padding: 10px; }
    .error { color: #f66; }
    .warn { color: #ff0; }
    .progress { color: #66f; }
  </style>
</head>
<body>
  <h1>DEBUG CONSOLE</h1>
  <div id="log"></div>

  <script>
    const log = document.getElementById('log');
    const addLog = (msg, type = 'log') => {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      console.log(msg);
    };

    // Override console
    ['log','warn','error','info'].forEach(m => {
      const orig = console[m];
      console[m] = (...args) => {
        addLog(args.join(' '), m);
        orig.apply(console, args);
      };
    });

    window.addEventListener('error', e => addLog(`SCRIPT ERROR: ${e.message}`, 'error'));
    window.addEventListener('unhandledrejection', e => addLog(`PROMISE ERROR: ${e.reason}`, 'error'));

    addLog('1. Page loaded, debug console active');
    addLog('2. Checking WebGL/WASM support...');

    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('webgl2');
    const hasWebGL = !!gl;
    const hasWASM = !!window.WebAssembly;

    addLog(`WebGL: ${hasWebGL} | WebAssembly: ${hasWASM}`);

    if (!hasWebGL || !hasWASM) {
      addLog('CRITICAL: Missing WebGL or WebAssembly - Chromebook may not support this build', 'error');
    } else {
      addLog('Support OK, checking files...');
      
      // Test file existence
      const testFiles = ['w-pt.loader.js', 'w-pt.data.unityweb', 'w-pt.framework.js.unityweb', 'w-pt.wasm.unityweb'];
      testFiles.forEach(file => {
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = file;
        link.onload = () => addLog(`${file}: OK`);
        link.onerror = () => addLog(`${file}: MISSING or UNLOADABLE`, 'error');
        document.head.appendChild(link);
      });
    }
  </script>
</body>
</html>
