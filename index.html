<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Hollow Knight SilkSong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    #unity-canvas { width: 100%; height: 100%; background: #000; display: block; }
    #status { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); color: #fff; font-family: monospace; z-index: 10; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script src="Build/w-pt.loader.js"></script>
  <script>
    const canvas = document.querySelector('#unity-canvas');
    const status = document.querySelector('#status');

    function showBanner(msg, type) {
      console.log(type + ': ' + msg);
    }

    const config = {
      dataUrl: 'Build/w-pt.data.unityweb',
      frameworkUrl: 'Build/w-pt.framework.js.unityweb',
      codeUrl: 'Build/w-pt.wasm.unityweb',
      streamingAssetsUrl: 'StreamingAssets',
      companyName: 'EDUrocks Group, Truffled, GN-Math',
      productName: 'Hollow Knight SilkSong',
      productVersion: '1.0',
      showBanner: showBanner,
      webglContextAttributes: { preserveDrawingBuffer: false, powerPreference: 1 }
    };

    createUnityInstance(canvas, config, progress => {
      status.textContent = 'Loading... ' + Math.round(progress * 100) + '%';
    }).then(() => {
      status.textContent = 'Loaded.';
    }).catch(err => {
      status.textContent = 'Failed: ' + err.message;
    });
  </script>
</body>
</html>
