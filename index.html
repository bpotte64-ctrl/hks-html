<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Hollow Knight SilkSong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
    #unity-canvas { width: 100%; height: 100%; background: #000; display: block; }
    #loading-text { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: #fff; z-index: 20; font: 600 22px/1.2 sans-serif; }
    #unity-warning { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); color: #fff; z-index: 20; width: min(92vw, 900px); }
    
    /* DEBUG CONSOLE */
    #debug-console {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; z-index: 30;
      background: rgba(0,0,0,0.95); color: #0f0; font: 14px/1.3 'Courier New', monospace;
      overflow-y: auto; padding: 8px; box-sizing: border-box; display: block;
    }
    #debug-console > div { margin-bottom: 2px; white-space: pre-wrap; }
    .debug-log { color: #0f0; }
    .debug-warn { color: #ff0; }
    .debug-error { color: #f66; }
    .debug-progress { color: #66f; }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>
  <div id="unity-warning"></div>
  <div id="debug-console"></div>

  <script src="w-pt.loader.js"></script>
  <script>
    // DEBUG CONSOLE SETUP
    const debugConsole = document.getElementById('debug-console');
    const logDebug = (msg, type = 'log') => {
      const div = document.createElement('div');
      div.className = `debug-${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugConsole.appendChild(div);
      debugConsole.scrollTop = debugConsole.scrollHeight;
    };

    // Override console methods to capture Unity loader output
    ['log', 'warn', 'error', 'info'].forEach(method => {
      const original = console[method];
      console[method] = (...args) => {
        logDebug(args.join(' '), method);
        original.apply(console, args);
      };
    });

    // Global error handler
    window.addEventListener('error', e => logDebug(`ERROR: ${e.message} at ${e.filename}:${e.lineno}`, 'error'));
    window.addEventListener('unhandledrejection', e => logDebug(`PROMISE REJECT: ${e.reason}`, 'error'));

    const canvas = document.querySelector('#unity-canvas');
    const loadingText = document.getElementById('loading-text');
    const warningBanner = document.getElementById('unity-warning');

    function unityShowBanner(msg, type) {
      logDebug(`BANNER [${type.toUpperCase()}]: ${msg}`, type);
      const div = document.createElement('div');
      div.textContent = msg;
      div.style.background = type === 'error' ? 'rgba(160,0,0,0.9)' : 'rgba(160,160,0,0.9)';
      div.style.padding = '10px';
      warningBanner.appendChild(div);
    }

    logDebug('Starting Unity loader...');

    const config = {
      dataUrl: 'w-pt.data.unityweb',
      frameworkUrl: 'w-pt.framework.js.unityweb',
      codeUrl: 'w-pt.wasm.unityweb',
      streamingAssetsUrl: 'StreamingAssets',
      companyName: 'EDUrocks Group, Truffled, GN-Math',
      productName: 'Hollow Knight SilkSong',
      productVersion: '1.0',
      showBanner: unityShowBanner,
      webglContextAttributes: { preserveDrawingBuffer: false, powerPreference: 1 }
    };

    logDebug('Config set, calling createUnityInstance');

    createUnityInstance(canvas, config, progress => {
      logDebug(`PROGRESS: ${Math.round(progress * 100)}%`, 'progress');
      loadingText.textContent = `LOADING... ${Math.round(progress * 100)}%`;
    }).then(() => {
      logDebug('SUCCESS: Unity loaded!');
      loadingText.remove();
    }).catch(err => {
      logDebug(`FAILED: ${err.message}`, 'error');
      loadingText.textContent = 'ERROR: ' + err.message;
    });
  </script>
</body>
</html>
