<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Hollow Knight SilkSong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { position: fixed; inset: 0; }
    #unity-canvas { width: 100%; height: 100%; display: block; background: #000; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; background: rgba(0,0,0,0.85);
      color: #fff; font-family: monospace; z-index: 20;
    }
  </style>
</head>
<body>
  <div id="status">Starting...</div>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>

  <script src="Build/w-pt.loader.js"></script>
  <script>
    const status = document.getElementById('status');
    const canvas = document.getElementById('unity-canvas');

    function showBanner(msg, type) {
      console.log(type + ': ' + msg);
    }

    const config = {
      dataUrl: 'Build/w-pt.data.unityweb',
      frameworkUrl: 'Build/w-pt.framework.js.unityweb',
      codeUrl: 'Build/w-pt.wasm.unityweb',
      streamingAssetsUrl: 'StreamingAssets',
      companyName: 'EDUrocks Group, Truffled, GN-Math',
      productName: 'Hollow Knight SilkSong',
      productVersion: '1.0',
      showBanner: showBanner,
      webglContextAttributes: {
        preserveDrawingBuffer: false,
        powerPreference: 1,
        alpha: false,
        antialias: false
      },
      cacheControl: function(url) {
        if (url.match(/\.data/) || url.match(/\.bundle/) || url.match(/\.wasm/) || url.match(/\.unityweb/)) return 'must-revalidate';
        return 'no-store';
      }
    };

    createUnityInstance(canvas, config, p => {
      status.textContent = 'Loading... ' + Math.round(p * 100) + '%';
    }).then(() => {
      status.textContent = 'Loaded.';
    }).catch(err => {
      status.textContent = 'Failed: ' + err.message;
    });
  </script>
</body>
</html>
