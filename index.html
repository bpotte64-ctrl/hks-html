<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Hollow Knight SilkSong</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { width: 100%; height: 100%; }
    #unity-canvas { width: 100%; height: 100%; background: #000; display: block; }
    #loading-text { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: #fff; z-index: 10; }
    #unity-warning { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); color: #fff; z-index: 10; width: min(92vw, 900px); }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>
  <div id="unity-warning"></div>

  <script src="w-pt.loader.js"></script>
  <script>
    const canvas = document.querySelector('#unity-canvas');
    const loadingText = document.querySelector('#loading-text');
    const warningBanner = document.querySelector('#unity-warning');

    function unityShowBanner(msg, type) {
      const div = document.createElement('div');
      div.textContent = msg;
      div.style.background = type === 'error' ? 'rgba(160,0,0,0.9)' : 'rgba(160,160,0,0.9)';
      div.style.padding = '10px';
      div.style.marginTop = '8px';
      warningBanner.appendChild(div);
    }

    const config = {
      dataUrl: 'w-pt.data.unityweb',
      frameworkUrl: 'w-pt.framework.js.unityweb',
      codeUrl: 'w-pt.wasm.unityweb',
      streamingAssetsUrl: 'StreamingAssets',
      companyName: 'EDUrocks Group, Truffled, GN-Math',
      productName: 'Hollow Knight SilkSong',
      productVersion: '1.0',
      showBanner: unityShowBanner,
      webglContextAttributes: { preserveDrawingBuffer: false, powerPreference: 1 }
    };

    createUnityInstance(canvas, config, p => {
      loadingText.textContent = 'LOADING... ' + Math.round(p * 100) + '%';
    }).then(() => {
      loadingText.remove();
    }).catch(err => {
      loadingText.textContent = 'ERROR: ' + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
